<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Promo Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .promo-container {
            width: 1024px;
            height: 1024px;
            background: linear-gradient(135deg, #1b1b1f 0%, #2a2a2f 100%);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* Logo/Icon area */
        .logo-area {
            width: 200px;
            height: 200px;
            background: #FF3B30;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.4);
        }

        .logo-icon {
            font-size: 100px;
            color: #fff;
        }

        /* Title */
        .title {
            font-size: 72px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: -2px;
        }

        .title-premium {
            background: linear-gradient(135deg, #FF3B30 0%, #FF9500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Subtitle */
        .subtitle {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 60px;
            text-align: center;
            font-weight: 500;
        }

        /* Features grid */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: #FF3B30;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .feature-text {
            font-size: 24px;
            color: #fff;
            font-weight: 600;
            line-height: 1.3;
        }

        /* Badge */
        .badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background: #FF3B30;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Decorative elements */
        .decoration {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 59, 48, 0.1) 0%, transparent 70%);
            top: -200px;
            right: -200px;
        }

        .decoration-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 149, 0, 0.1) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
        }

        /* PRO version specific styles */
        .pro-version .title {
            color: #FF3B30;
        }

        /* Premium version specific styles */
        .premium-version .title {
            background: linear-gradient(135deg, #FF3B30 0%, #FF9500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <!-- PRO Version -->
    <div class="promo-container pro-version" id="pro-version">
        <div class="decoration"></div>
        <div class="decoration-2"></div>
        <div class="badge">PRO</div>
        
        <div class="logo-area">
            <div class="logo-icon">🚗</div>
        </div>
        
        <h1 class="title">PRO</h1>
        <p class="subtitle">Полный контроль над вашим гаражом</p>
        
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">🚙</div>
                <div class="feature-text">До 3 автомобилей</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔔</div>
                <div class="feature-text">Безлимит напоминаний</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📄</div>
                <div class="feature-text">Фото документов</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div class="feature-text">PDF экспорт</div>
            </div>
        </div>
    </div>
